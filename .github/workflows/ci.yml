name: CI

on:
  push:
    branches: [main, feature/**, codex/**]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  observer-go:
    name: Observer-Go – vet, build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: observer-go/go.mod
          cache-dependency-path: observer-go/go.sum

      - name: go vet
        run: make vet

      - name: Build binary
        run: make build

      - name: Run tests
        run: make test

  extension:
    name: Extension – unit & integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version-file: observer-go/go.mod
          cache-dependency-path: observer-go/go.sum

      - name: Install dependencies
        working-directory: extension
        run: npm ci

      - name: Run unit + integration tests
        working-directory: extension
        run: npm run test:all

  client:
    name: Client – unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: observer-go/client/package-lock.json

      - name: Install dependencies
        working-directory: observer-go/client
        run: npm ci

      - name: Run tests
        working-directory: observer-go/client
        run: npx vitest run
