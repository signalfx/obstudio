name: CI

on:
  push:
    branches: [main, feature/**]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  observer-go:
    name: Observer-Go – vet, build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: observer-go/go.mod
          cache-dependency-path: observer-go/go.sum

      - name: Stage embedded skills
        run: |
          cp -R skills observer-go/cmd/obstudio/_skills
          cp docs/examples.md observer-go/cmd/obstudio/_skills/examples.md

      - name: go vet
        working-directory: observer-go
        run: go vet ./...

      - name: Build binary
        run: make build

      - name: Run tests
        run: make test

  skill-evals:
    name: Skill evals – structural & semconv
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Structural eval (python-flask-basic)
        run: python evals/scripts/check_structural.py demo/python-flask-basic evals/golden/python-flask-basic

      - name: Semconv eval (python-flask-basic)
        run: python evals/scripts/check_semconv.py demo/python-flask-basic

      - name: Golden comparison eval (python-flask-basic)
        run: python evals/scripts/run_golden_compare.py demo/python-flask-basic evals/golden/python-flask-basic --threshold 0.80
