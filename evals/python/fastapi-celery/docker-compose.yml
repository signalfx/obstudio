services:
  observer:
    build:
      context: ./.codex-runtime/repo
      dockerfile: observer/Dockerfile
    ports:
      - "3000:3000"
      - "4318:4318"
      - "4317:4317"
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - OTLP_HTTP_PORT=4318
      - OTLP_GRPC_PORT=4317

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

  worker:
    build: .
    command: uv run celery -A worker worker --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
