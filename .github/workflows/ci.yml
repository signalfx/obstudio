name: CI

on:
  push:
    branches: [main, feature/**]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  observer:
    name: Observer – vet, build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: observer/go.mod
          cache-dependency-path: observer/go.sum

      - name: go vet
        run: make -C observer vet

      - name: Build binary
        run: make -C observer build

      - name: Run tests
        run: make -C observer test

  extension:
    name: Extension – test & package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version-file: observer/go.mod
          cache-dependency-path: observer/go.sum

      - name: Install dependencies
        working-directory: extension
        run: npm ci

      - name: Run unit tests
        working-directory: extension
        run: npm run test:unit

      - name: Run integration tests
        working-directory: extension
        run: npm run test:integration

      - name: Run VS Code host tests
        working-directory: extension
        run: xvfb-run -a npm run test:host

      - name: Build VSIX
        working-directory: extension
        run: npm run build:vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: observability-studio-vsix
          path: extension/*.vsix
          if-no-files-found: error

  client:
    name: Client – unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: observer/client/package-lock.json

      - name: Install dependencies
        working-directory: observer/client
        run: npm ci

      - name: Run tests
        working-directory: observer/client
        run: npx vitest run
