name: CI

on:
  push:
    branches: [main, feature/**]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  observer:
    name: Observer – vet, build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: observer/go.mod
          cache-dependency-path: observer/go.sum

      - name: go vet
        run: make vet

      - name: Build binary
        run: make build

      - name: Run tests
        run: make test

  extension:
    name: Extension – unit & integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version-file: observer/go.mod
          cache-dependency-path: observer/go.sum

      - name: Install dependencies
        working-directory: extension
        run: npm ci

      - name: Run unit + integration tests
        working-directory: extension
        run: npm run test:all

  client:
    name: Client – unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: observer/client/package-lock.json

      - name: Install dependencies
        working-directory: observer/client
        run: npm ci

      - name: Run tests
        working-directory: observer/client
        run: npx vitest run

  skill-evals:
    name: Skill evals – structural & semconv
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Structural eval (python-flask-basic)
        run: python evals/scripts/check_structural.py demo/python-flask-basic evals/golden/python-flask-basic

      - name: Semconv eval (python-flask-basic)
        run: python evals/scripts/check_semconv.py demo/python-flask-basic

      - name: Golden comparison eval (python-flask-basic)
        run: python evals/scripts/run_golden_compare.py demo/python-flask-basic evals/golden/python-flask-basic --threshold 0.80
