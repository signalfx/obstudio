<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Observer — Telemetry Explorer</title>
  <link rel="stylesheet" href="/assets/main.css?v=4" />
</head>
<body>
  <div id="root"><h1 style="color:lime;padding:40px;font-size:40px;background:black;">LOADING OBSERVER UI...</h1></div>
  <script>
    window.onerror = function(msg, url, line, col, err) {
      document.getElementById('root').innerHTML =
        '<pre style="color:red;padding:40px;font-size:14px;background:black;">JS Error:\n' + msg + '\nat ' + url + ':' + line + ':' + col + '\n' + (err && err.stack ? err.stack : '') + '</pre>';
    };
  </script>
  <script src="/assets/main.js?v=5"></script>
</body>
</html>
