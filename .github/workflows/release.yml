name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: observer/client/package-lock.json

      - name: Pin npm version
        run: |
          npm i -g npm@11.6.2
          npm --version

      - uses: actions/setup-go@v5
        with:
          go-version-file: observer/go.mod
          cache-dependency-path: observer/go.sum

      - name: Install client build dependencies
        timeout-minutes: 10
        working-directory: observer/client
        run: npm ci --no-audit --no-fund --verbose

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
